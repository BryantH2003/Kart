stages:
  - validate
  - test
  - build

variables:
  NODE_VERSION: "20"

default:
  image: node:${NODE_VERSION}-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

# ── Validate stage ─────────────────────────────────────────────
# Lint and typecheck run in parallel on every MR and push to main.

lint:
  stage: validate
  script:
    - npm ci
    - npm run lint
  only:
    - merge_requests
    - main

typecheck:
  stage: validate
  script:
    - npm ci
    - npm run typecheck
  only:
    - merge_requests
    - main

# ── Test stage ─────────────────────────────────────────────────
# Unit tests run after validate passes.

unit-tests:
  stage: test
  script:
    - npm ci
    - npm run test
  coverage: '/^All files\s*\|\s*[\d.]+/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    when: always
    expire_in: 7 days
  only:
    - merge_requests
    - main

# ── Build stage ────────────────────────────────────────────────
# Verify the Next.js production build compiles cleanly on main only.
# Deployment is handled by Railway's native GitLab integration —
# Railway watches main and auto-deploys after each push.

build:
  stage: build
  script:
    - npm ci
    - npm run build
  only:
    - main
