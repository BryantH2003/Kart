stages:
  - test

variables:
  NODE_VERSION: "20"

# ── Test stage ────────────────────────────────────────────────
# Runs on every merge request and every push to main.
# Catches TypeScript errors and lint issues before they reach production.
# Deployment is handled automatically by Railway's native GitLab integration —
# Railway watches main and deploys on every push, no CLI needed.
lint-and-typecheck:
  stage: test
  image: node:${NODE_VERSION}-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run lint
    - npm run typecheck
  only:
    - merge_requests
    - main
